<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <style>
        table,tr{
            border: 1px solid black;
            width: 100%;
            border-collapse: collapse;
            padding : 10px;
        }
        td,th{
            border: 1px solid black;
            border-collapse: collapse;
            padding : 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Coutry</th>
            <th>Country Code</th>
            <th>Name</th>
        </tr>
        <tr>
            <td>Pakistan</td>
            <td>+92</td>
            <td>Usman</td>
        </tr>
        <tr>
            <td>India</td>
            <td>+91</td>
            <td>Aman</td>
        </tr>
        <tr>
            <td>Norway</td>
            <td>+51</td>
            <td>John</td>
        </tr>
    </table>





</body>
</html>
